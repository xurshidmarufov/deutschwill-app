<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will Conversation</title>

    <link rel="stylesheet" href="../css/conversation.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="conversation-container">

    <!-- Header -->
    <header class="conversation-header">

        <button class="back-btn">
            <i data-lucide="arrow-left"></i>
        </button>

        <div class="header-center">
            <h2>Will</h2>
            <p>
                <span class="online-dot"></span>
                Online
            </p>
        </div>

        <button class="settings-btn">
            <i data-lucide="ellipsis"></i>
        </button>

    </header>
<!-- AI Conversation -->
<main class="conversation-main">

    <div class="orb-container">

        <!-- AI Orb -->
        <div class="ai-orb">

            <div class="orb-layer orb-purple"></div>

            <div class="orb-layer orb-blue"></div>

            <div class="orb-layer orb-cyan"></div>

            <div class="orb-layer orb-violet"></div>

            <div class="orb-glow"></div>

        </div>

        <div class="orb-text">
            <h3>Deutsch Will AI</h3>
            <p>Tap the microphone and start speaking</p>
        </div>

    </div>

</main>

            <!-- Intro -->
            <div class="orb-text">
                <h3>Sprich mit Will.</h3>
                <p>🇺🇿 Mikrofonni bosing va suhbatni boshlang.</p>
            </div>

            <!-- Subtitle -->
            <div class="subtitle-box">

                <p class="german"></p>

                <p class="uzbek"></p>

            </div>

            <!-- Microphone -->
            <button class="mic-btn">
                <i data-lucide="mic"></i>
            </button>

        </div>

    </main>

</div>

<script>
    lucide.createIcons();
</script>

<script src="../js/conversation.js"></script>

</body>
</html>
