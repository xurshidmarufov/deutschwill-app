<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Deutsch Will</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<div class="container">

    <!-- Header -->

    <header class="header">

        <div class="logo-box">

            <img src="assets/logo.png" alt="Logo">

        </div>

        <div class="header-content">

            <h1>🇩🇪 Deutsch Will</h1>

            <p>Learn German with Your AI Teacher</p>

        </div>

    </header>

    <!-- Hero -->

    <section class="hero">

        <div class="hero-card">

            <h2 class="hero-title">

                <i data-lucide="mic"></i>

                <span>Talk with Will</span>

            </h2>

            <div class="status">

                <span class="online-dot"></span>

                <span>Will is Ready</span>

            </div>

            <p class="hero-description">

                Practice real German conversations with your personal AI teacher.

            </p>

            <button id="startChat">

                Start Conversation

            </button>

        </div>

    </section>

    <!-- Features -->

   <section class="features">

    <button class="feature-card vocabulary">
            <div class="feature-icon">
                <i data-lucide="book-open-text"></i>
            </div>

            <h3>Lug'at</h3>

            <p>Yangi so'zlarni o'rganing</p>

        </button>


        <button class="feature-card tests">

            <div class="feature-icon">
                <i data-lucide="clipboard-check"></i>
            </div>

            <h3>Testlar</h3>

            <p>Bilimingizni sinab ko'ring</p>

        </button>


        <button class="feature-card movies">

            <div class="feature-icon">
                <i data-lucide="clapperboard"></i>
            </div>

            <h3>Movies</h3>

            <p>Film va seriallar orqali o'rganing</p>

        </button>


        <button class="feature-card challenge">

            <div class="feature-icon">
                <i data-lucide="target"></i>
            </div>

            <h3>Daily Challenge</h3>

            <p>Bugungi mashqni bajaring</p>

        </button>

    </section>

</div>
<!-- Bottom Navigation -->
<!-- Bottom Navigation -->

<nav class="bottom-nav">

    <button class="nav-item active">

        <i data-lucide="house"></i>

        <span>Home</span>

    </button>

    <button class="nav-item">

        <i data-lucide="message-circle"></i>

        <span>Chat</span>

    </button>

    <button class="nav-item">

        <i data-lucide="trophy"></i>

        <span>Rank</span>

    </button>

    <button class="nav-item">

        <i data-lucide="user"></i>

        <span>Profil</span>

    </button>

</nav>

<script>
    lucide.createIcons();
</script>

<script src="script.js"></script>

</body>

</html>
