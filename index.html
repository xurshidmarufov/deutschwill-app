<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Will</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <header>

        <div class="logo">
            <img src="assets/logo.png" alt="Deutsch Will Logo">
        </div>

        <h1>Deutsch Will</h1>

        <p class="subtitle">
            Learn German with Your AI Teacher
        </p>

    </header>


    <section class="hero">

        <div class="hero-card">

            <i data-lucide="mic" class="hero-icon"></i>

            <h2>Talk with AI</h2>

            <p>
                Practice real conversations with your AI teacher.
            </p>

            <button id="startChat">
                Start Conversation
            </button>

        </div>

    </section>


    <section class="features">

        <div class="feature-card">

            <i data-lucide="book-open"></i>

            <h3>Lug'at</h3>

        </div>


        <div class="feature-card">

            <i data-lucide="clipboard-check"></i>

            <h3>Testlar</h3>

        </div>


        <div class="feature-card">

            <i data-lucide="film"></i>

            <h3>Movies</h3>

        </div>

    </section>

</div>


<nav class="bottom-nav">

    <button class="active">

        <i data-lucide="house"></i>

        <span>Home</span>

    </button>

    <button>

        <i data-lucide="message-circle"></i>

        <span>Chat</span>

    </button>

    <button>

        <i data-lucide="trophy"></i>

        <span>Rank</span>

    </button>

    <button>

        <i data-lucide="user"></i>

        <span>Profil</span>

    </button>

</nav>


<script src="script.js"></script>

<script src="https://unpkg.com/lucide@latest"></script>

<script>
lucide.createIcons();
</script>

</body>
</html>
