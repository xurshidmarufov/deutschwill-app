<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Will</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <header>

        <div class="logo">
            <img src="assets/logo.png" alt="Deutsch Will">
        </div>

        <h1>Deutsch Will</h1>

        <p class="subtitle">
            Learn German naturally with your AI Teacher
        </p>

    </header>


    <section class="hero">

        <div class="hero-card">

            <h2>🇩🇪 Welcome!</h2>

            <p>
                Practice German every day with your personal AI teacher.
            </p>

            <button id="startChat">
                Start Conversation
            </button>

        </div>

    </section>


    <section class="progress">

        <h3>Today's Progress</h3>

        <div class="progress-box">

            <div class="item">
                🔥
                <span>0 Day Streak</span>
            </div>

            <div class="item">
                ⭐
                <span>0 XP</span>
            </div>

        </div>

    </section>

</div>


<nav class="bottom-nav">

    <button class="active">
        🏠
        <span>Home</span>
    </button>

    <button>
        💬
        <span>Chat</span>
    </button>

    <button>
        👤
        <span>Profile</span>
    </button>

</nav>


<script src="script.js"></script>

</body>
</html>
